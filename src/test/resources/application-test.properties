# H2 in-memory database — replaces MySQL for all tests
# MODE=MySQL makes H2 behave like MySQL (syntax, types)
# NON_KEYWORDS=value prevents conflict with H2 reserved word used as column name
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=value;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create schema fresh for each test run, drop on exit
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Fixed JWT secret for predictable test tokens
app.jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci11bml0LXRlc3Rpbmctb25seS0hISEhISE=
app.jwt.expiration-ms=3600000

# Disable Swagger in tests
springdoc.swagger-ui.enabled=false
